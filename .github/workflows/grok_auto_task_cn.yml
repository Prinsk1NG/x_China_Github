name: X中文圈吃瓜日报自动发布

on:
  schedule:
    - cron: "0 23 * * *"   # 每天北京时间 07:00
  workflow_dispatch:

jobs:
  run-grok:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # 最多跑 60 分钟，远低于 GitHub Actions 6 小时上限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run grok_auto_task_cn
        env:
          GROK_COOKIES:       ${{ secrets.GROK_COOKIES }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          SF_API_KEY:         ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY:      ${{ secrets.IMGBB_API_KEY }}
          KIMI_API_KEY:       ${{ secrets.KIMI_API_KEY }}
        run: python grok_auto_task_cn.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7
          if-no-files-found: ignore
