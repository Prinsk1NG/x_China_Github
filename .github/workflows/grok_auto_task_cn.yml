name: Digital Nomad Daily Report (Grok+xAI v8.0)

on:
  # 每天定时执行 (UTC时间 00:00，对应北京时间早上 08:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 允许在 GitHub Actions 页面手动点击运行，并支持传入测试参数
  workflow_dispatch:
    inputs:
      test_mode:
        description: '开启测试模式 (只扫第一批14人，快速验证)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # 🚨 核心改动 1：安装 playwright(网页自动化) 和 pynacl(自动更新Cookie密文)
          pip install requests xai-sdk playwright pynacl
          
          # 🚨 核心改动 2：安装 Chromium 浏览器内核供 Grok 抓取使用
          playwright install chromium
          
      - name: Run Auto Task Script
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode }}
          
          # 🚨 核心改动 3：引入 Grok 网页版身份凭证与 GitHub 自动续期 Token
          SUPER_GROK_COOKIES: ${{ secrets.SUPER_GROK_COOKIES }}
          PAT_FOR_SECRETS: ${{ secrets.PAT_FOR_SECRETS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
        run: |
          # 确保这里执行的文件名与你仓库里的 Python 主程序文件名完全一致！
          python x_api_auto_task_xai_xml.py

      - name: Upload Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-data
          # 🚨 核心改动 4：V8.0 代码保存数据的文件夹名变更为 data_cn
          path: data_cn/
          retention-days: 7
